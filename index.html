// ==================== AUDIO SYSTEM ====================
class SoundSystem {
  constructor() {
    this.ctx = null;
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch(e) {}
  }

  play(type) {
    if (!this.initialized) this.init();
    if (!this.ctx) return;
    
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    
    switch(type) {
      case 'correct':
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
        break;
      case 'wrong':
        osc.frequency.setValueAtTime(392, now);
        osc.frequency.setValueAtTime(330, now + 0.15);
        osc.frequency.setValueAtTime(262, now + 0.3);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
        break;
      case 'star':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(784, now);
        osc.frequency.setValueAtTime(1047, now + 0.1);
        osc.frequency.setValueAtTime(1568, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
        osc.start(now);
        osc.stop(now + 0.35);
        break;
      case 'click':
        osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.05);
        break;
      case 'win':
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          o.connect(g);
          g.connect(this.ctx.destination);
          o.frequency.value = f;
          g.gain.setValueAtTime(0.2, now + i * 0.15);
          g.gain.linearRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
          o.start(now + i * 0.15);
          o.stop(now + i * 0.15 + 0.3);
        });
        break;
      case 'page':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.setValueAtTime(800, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
        break;
    }
  }
}

function getAnimalForSubject(subject, mode) {
  for (const [key, animal] of Object.entries(ANIMALS)) {
    if (animal.subject === subject && (animal.mode === mode || animal.mode === 'both')) {
      return key;
    }
  }
  return null;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randomChoice(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function drawStar(x, y, size, color = COLORS.starGold) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const px = x + Math.cos(angle) * size;
    const py = y + Math.sin(angle) * size;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawButton(x, y, w, h, color, text, textColor = '#fff', radius = 20) {
  ctx.fillStyle = color;
  roundRect(x, y, w, h, radius);
  ctx.fill();
  if (text) {
    ctx.fillStyle = textColor;
    ctx.font = `bold ${Math.min(h * 0.5, 28)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + w/2, y + h/2);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawText(text, x, y, size = 24, color = COLORS.textDark, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px sans-serif`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function isPointInRect(px, py, x, y, w, h) {
  return px >= x && px <= x + w && py >= y && py <= y + h;
}

function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#E8F5E9');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // Ground
  ctx.fillStyle = '#90EE90';
  ctx.fillRect(0, GAME_HEIGHT - 80, GAME_WIDTH, 80);

  // Trees
  for (let i = 0; i < 6; i++) {
    drawTree(80 + i * 130, GAME_HEIGHT - 80, 0.6 + (i % 3) * 0.2);
  }
}

function drawTree(x, y, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  // Trunk
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(-10, -60, 20, 60);
  // Leaves
  ctx.fillStyle = '#228B22';
  ctx.beginPath();
  ctx.moveTo(0, -120);
  ctx.lineTo(-40, -50);
  ctx.lineTo(40, -50);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -90);
  ctx.lineTo(-35, -30);
  ctx.lineTo(35, -30);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawFox(size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, size * 0.3, size * 0.4, size * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.2, size * 0.35, size * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-size * 0.25, -size * 0.4);
  ctx.lineTo(-size * 0.35, -size * 0.7);
  ctx.lineTo(-size * 0.1, -size * 0.45);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(size * 0.25, -size * 0.4);
  ctx.lineTo(size * 0.35, -size * 0.7);
  ctx.lineTo(size * 0.1, -size * 0.45);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.05, size * 0.15, size * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(0, -size * 0.1, size * 0.05, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-size * 0.15, -size * 0.3, size * 0.05, 0, Math.PI * 2);
  ctx.arc(size * 0.15, -size * 0.3, size * 0.05, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(size * 0.5, size * 0.2, size * 0.3, size * 0.15, Math.PI * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(size * 0.65, size * 0.15, size * 0.1, size * 0.08, Math.PI * 0.3, 0, Math.PI * 2);
  ctx.fill();
}

  ctx.arc(size * 0.3, -size * 0.45, size * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#D7CCC8';
  ctx.beginPath();

  ctx.fillStyle = '#333';

  ctx.fillStyle = '#FF9800';
  ctx.beginPath();

// ==================== PARTICLE SYSTEM ====================
function createParticles(x, y, type = 'star') {
  const count = type === 'star' ? 8 : 12;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    const speed = 3 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 60,
      type,
      color: type === 'star' ? COLORS.starGold : (type === 'correct' ? '#4CAF50' : '#FF5252'),
      size: type === 'star' ? 12 : 8
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life / 60;
    if (p.type === 'star') {
      drawStar(p.x, p.y, p.size, p.color);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / 60), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ==================== QUESTION GENERATORS ====================
function generateQuestions(animalKey, level) {
  const animal = ANIMALS[animalKey];
  
  switch(animal.subject) {
    case 'numbers': return generateNumberQuestions(level);
    case 'shapes': return generateShapeQuestions(level);
    case 'math': return generateMathQuestions(level);
    case 'logic': return generateLogicQuestions(level);
    case 'letters': return generateLetterQuestions(level);
    case 'lettersAdvanced': return generateLettersAdvancedQuestions(level);
    case 'chinese': return generateChineseQuestions(level);
    case 'englishWord': return generateEnglishWordQuestions(level);
    case 'colors': return generateColorQuestions(level);
    case 'logicAdvanced': return generateLogicAdvancedQuestions(level);
    default: return generateNumberQuestions(level);
  }
}

// V2: Expanded number questions (1-50)
function generateNumberQuestions(level) {
  let maxNum;
  if (level === 1) maxNum = 10;
  else if (level === 2) maxNum = 20;
  else if (level === 3) maxNum = 30;
  else if (level === 4) maxNum = 40;
  else maxNum = 50;
  
  const questions = [];
  
  for (let i = 0; i < totalQuestions; i++) {
    const num = randomInt(1, maxNum);
    const type = randomChoice(['recognize', 'count']);
    
    if (type === 'recognize') {
      const visuals = [];
      for (let j = 1; j <= Math.min(num, 10); j++) {
        visuals.push(randomChoice(['🍎','⭐','●','🐟']));
      }
      questions.push({
        type: 'recognize',
        text: `数字 ${num}`,
        display: visuals.slice(0, num).join(' '),
        answer: num,
        options: shuffle([num, randomInt(1, maxNum), randomInt(1, maxNum)]).filter((v, i, a) => a.indexOf(v) === i).slice(0, 3),
        unit: '个'
      });
    } else {
      const count = randomInt(1, Math.min(maxNum, 12));
      const item = randomChoice(['🍎','🐟','🐰','⭐','🌟','🍊']);
      questions.push({
        type: 'count',
        text: `数一数，有几个？`,
        display: item.repeat(Math.min(count, 15)),
        answer: count,
        options: shuffle([count, randomInt(1, Math.min(maxNum, 12)), randomInt(1, Math.min(maxNum, 12))]).filter((v, i, a) => a.indexOf(v) === i).slice(0, 3)
      });
    }
  }
  return questions;
}

// V2: Expanded shape questions (9 shapes)
function generateShapeQuestions(level) {
  const questions = [];
  let availableShapes;
  if (level === 1) availableShapes = SHAPES.slice(0, 3);
  else if (level === 2) availableShapes = SHAPES.slice(0, 5);
  else if (level === 3) availableShapes = SHAPES.slice(0, 7);
  else availableShapes = SHAPES;
  
  for (let i = 0; i < totalQuestions; i++) {
    const shape = randomChoice(availableShapes);
    questions.push({
      type: 'shape',
      text: `这是什麼圖形？`,
      display: shape,
      answer: shape,
      options: shuffle(availableShapes).slice(0, 3),
      shapes: [shape]
    });
  }
  return questions;
}

// V2: Expanded math questions (up to 1000)
function generateMathQuestions(level) {
  const questions = [];
  
  for (let i = 0; i < totalQuestions; i++) {
    let a, b, op, answer;
    
    if (level === 1) {
      // 10以内加减
      a = randomInt(1, 9);
      b = randomInt(1, 9 - a);
      op = '+';
      answer = a + b;
    } else if (level === 2) {
      // 20以内加减
      a = randomInt(5, 15);
      b = randomInt(1, 15);
      op = randomChoice(['+', '-']);
      answer = op === '+' ? a + b : a - b;
    } else if (level === 3) {
      // 50以内
      a = randomInt(10, 40);
      b = randomInt(10, 40);
      op = randomChoice(['+', '-']);
      answer = op === '+' ? a + b : a - b;
    } else if (level === 4) {
      // 100以内乘除
      if (Math.random() > 0.5) {
        a = randomInt(2, 10);
        b = randomInt(2, 10);
        op = '×';
        answer = a * b;
      } else {
        answer = randomInt(2, 10);
        b = randomInt(2, 10);
        a = answer * b;
        op = '÷';
      }
    } else {
      // 1000以内
      if (Math.random() > 0.6) {
        a = randomInt(10, 30);
        b = randomInt(10, 30);
        op = '×';
        answer = a * b;
      } else if (Math.random() > 0.5) {
        a = randomInt(100, 900);
        b = randomInt(1, 9);
        op = '÷';
        answer = Math.floor(a / b);
        a = answer * b;
      } else {
        a = randomInt(100, 900);
        b = randomInt(100, 900);
        op = randomChoice(['+', '-']);
        answer = op === '+' ? a + b : a - b;
      }
    }
    
    const text = op === '+' ? `${a} + ${b} = ?` : op === '-' ? `${a} - ${b} = ?` : op === '×' ? `${a} × ${b} = ?` : `${a} ÷ ${b} = ?`;
    const wrongAnswers = [
      answer + randomInt(1, Math.max(5, Math.floor(answer * 0.2))),
      answer - randomInt(1, Math.max(3, Math.floor(answer * 0.1))),
      answer + randomInt(-2, 2)
    ].filter(v => v !== answer && v > 0);
    
    questions.push({
      type: 'math',
      text,
      answer,
      options: shuffle([answer, ...wrongAnswers.slice(0, 2)]).slice(0, 3)
    });
  }
  return questions;
}

// V2: Logic questions with 3-5 steps
function generateLogicQuestions(level) {
  const questions = [];
  
  for (let i = 0; i < totalQuestions; i++) {
    if (level === 1) {
      // AAB pattern (2 steps)
      const items = ['🔴', '🔵', '🟢', '🟡', '🟠', '🟣'];
      const item = randomChoice(items);
      const seq = [item, item, randomChoice(items.filter(v => v !== item)), '?'];
      questions.push({
        type: 'logic',
        text: '找规律，下一个是什么？',
        display: seq.slice(0, 3).join('  '),
        answer: item,
        options: shuffle([item, randomChoice(items.filter(v => v !== item)), randomChoice(items.filter(v => v !== item))])
      });
    } else if (level === 2) {
      // ABC pattern (3 steps)
      const items = ['🔴', '🔵', '🟢', '🟡', '🟠'];
      const pattern = shuffle(items).slice(0, 3);
      const seq = [...pattern, '?'];
      questions.push({
        type: 'logic',
        text: '找规律，下一个是什么？',
        display: seq.slice(0, 4).join('  '),
        answer: pattern[0],
        options: shuffle([pattern[0], pattern[1], pattern[2]])
      });
    } else if (level === 3) {
      // Number sequence with step (3-4 steps)
      const step = randomInt(2, 5);
      const start = randomInt(1, 10);
      const seq = [];
      for (let j = 0; j < 4; j++) seq.push(start + j * step);
      questions.push({
        type: 'logic_num',
        text: '找规律，下一个数字是？',
        display: seq.slice(0, 3).join(' → ') + ' → ?',
        answer: seq[3],
        options: shuffle([seq[3], seq[3] + randomInt(1, 5), seq[3] - randomInt(1, 3)]).filter((v, i, a) => v > 0 && a.indexOf(v) === i).slice(0, 3)
      });
    } else if (level === 4) {
      // ABAC pattern (4 steps)
      const items = ['🔴', '🔵', '🟢'];
      const a = randomChoice(items);
      const b = randomChoice(items.filter(v => v !== a));
      const pattern = [a, b, a, '?'];
      questions.push({
        type: 'logic',
        text: '找规律，下一个是什么？',
        display: pattern.slice(0, 3).join('  '),
        answer: b,
        options: shuffle([b, a, randomChoice(items.filter(v => v !== a && v !== b))])
      });
    } else {
      // Growing pattern (5 steps)
      const base = randomInt(1, 3);
      const seq = [];
      for (let j = 0; j < 5; j++) seq.push(base + j * 2);
      questions.push({
        type: 'logic_num',
        text: '找规律，下一个数字是？',
        display: seq.slice(0, 4).join(' → ') + ' → ?',
        answer: seq[4],
        options: shuffle([seq[4], seq[4] + 2, seq[4] - 2, seq[3]]).filter((v, i, a) => v > 0 && a.indexOf(v) === i).slice(0, 3)
      });
    }
  }
  return questions;
}

// V2: Letters Advanced (for deer) - uppercase + lowercase matching
function generateLettersAdvancedQuestions(level) {
  const questions = [];
  
  for (let i = 0; i < totalQuestions; i++) {

    const lowerLetter = letter.toLowerCase();
    
    if (level === 1) {
      // Match uppercase to lowercase
      const options = shuffle([lowerLetter, randomChoice(ALPHABET_LOWER.split('')), randomChoice(ALPHABET_LOWER.split(''))]);
      questions.push({
        type: 'letter_match',
        text: `${letter} 的小写是什么？`,
        display: letter,
        answer: lowerLetter,
        options: options.filter((v, i, a) => a.indexOf(v) === i).slice(0, 3)
      });
    } else if (level === 2) {
      // Match lowercase to uppercase
      const options = shuffle([letter, randomChoice(ALPHABET.split('')), randomChoice(ALPHABET.split(''))]);
      questions.push({
        type: 'letter_match',
        text: `${lowerLetter} 的大写是什么？`,
        display: lowerLetter,
        answer: letter,
        options: options.filter((v, i, a) => a.indexOf(v) === i).slice(0, 3)
      });
    } else {
      // Fill in the missing letter (sequence)
      const idx = ALPHABET.indexOf(letter);
      const missingIdx = randomChoice([idx - 1, idx + 1]);
      const missingLetter = ALPHABET[Math.max(0, Math.min(25, missingIdx))];
      const before = ALPHABET[Math.max(0, missingIdx - 1)];
      const after = ALPHABET[Math.min(25, missingIdx + 1)];
      
      questions.push({
        type: 'letter_seq',
        text: `字母顺序：${before} ? ${after}，?是什么？`,
        display: `${before}  ?  ${after}`,
        answer: missingLetter,
        options: shuffle([missingLetter, randomChoice(ALPHABET.split('')), randomChoice(ALPHABET.split(''))]).filter((v, i, a) => a.indexOf(v) === i).slice(0, 3)
      });
    }
  }
  return questions;
}

// V2: Logic Advanced questions (3-5 steps, for beaver)
function generateLogicAdvancedQuestions(level) {
  const questions = [];
  
  for (let i = 0; i < totalQuestions; i++) {
    if (level === 1) {
      // 3-step pattern
      const items = ['🔴', '🔵', '🟢', '🟡'];
      const pattern = shuffle(items).slice(0, 3);
      const seq = [...pattern, '?'];
      questions.push({
        type: 'logic',
        text: '找规律，下一个是什么？（3步循环）',
        display: seq.slice(0, 4).join('  '),
        answer: pattern[0],
        options: shuffle([pattern[0], pattern[1], pattern[2]])
      });
    } else if (level === 2) {
      // 4-step pattern
      const items = ['🔴', '🔵', '🟢', '🟡'];
      const pattern = shuffle(items).slice(0, 4);
      const seq = [...pattern, '?'];
      questions.push({
        type: 'logic',
        text: '找规律，下一个是什么？（4步循环）',
        display: seq.slice(0, 4).join('  '),
        answer: pattern[0],
        options: shuffle([pattern[0], pattern[1], pattern[2], pattern[3]]).slice(0, 3)
      });
    } else if (level === 3) {
      // Growing pattern
      const start = randomInt(1, 5);
      const step = randomInt(2, 4);
      const seq = [start, start + step, start + step * 2, '?'];
      const answer = start + step * 3;
      questions.push({
        type: 'logic_num',
        text: '找规律，下一个数字是？（递增）',
        display: seq.join(' → '),
        answer: answer,
        options: shuffle([answer, answer + step, answer - step]).filter((v, i, a) => v > 0 && a.indexOf(v) === i).slice(0, 3)
      });
    } else if (level === 4) {
      // Double pattern (AABB)
      const a = randomChoice(['🔴', '🔵', '🟢']);
      const b = randomChoice(['🟡', '🟠', '🟣'].filter(v => v !== a));
      const pattern = [a, a, b, b, '?'];
      questions.push({
        type: 'logic',
        text: '找规律，下一个是什么？（AABB）',
        display: pattern.slice(0, 4).join('  '),
        answer: a,
        options: shuffle([a, b, randomChoice(['🟡', '🟠'])]).slice(0, 3)
      });
    } else {
      // Complex sequence with operation
      const base = randomInt(1, 5);
      const mul = randomInt(2, 3);
      const seq = [base, base * mul, base * mul * mul, '?'];
      const answer = base * mul * mul * mul;
      questions.push({
        type: 'logic_num',
        text: '找规律，下一个数字是？（倍数增长）',
        display: seq.join(' → '),
        answer: answer,
        options: shuffle([answer, base * mul * mul + mul, base * mul * mul * 2]).filter((v, i, a) => v > 0 && a.indexOf(v) === i).slice(0, 3)
      });
    }
  }
  return questions;
}

// ==================== SHAPE DRAWING ====================
function drawShapeOnCanvas(shape, x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  
  switch(shape) {
    case 'circle':
      ctx.beginPath();
      ctx.arc(0, 0, size/2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'square':
      ctx.fillRect(-size/2, -size/2, size, size);
      break;
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo(0, -size/2);
      ctx.lineTo(size/2, size/2);
      ctx.lineTo(-size/2, size/2);
      ctx.closePath();
      ctx.fill();
      break;
    case 'rectangle':
      ctx.fillRect(-size/2, -size/3, size, size * 0.66);
      break;
    case 'ellipse':
      ctx.beginPath();
      ctx.ellipse(0, 0, size/2, size/3, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(0, -size/2);
      ctx.lineTo(size/2, 0);
      ctx.lineTo(0, size/2);
      ctx.lineTo(-size/2, 0);
      ctx.closePath();
      ctx.fill();
      break;
    case 'semicircle':
      ctx.beginPath();
      ctx.arc(0, 0, size/2, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      break;
    case 'trapezoid':
      ctx.beginPath();
      ctx.moveTo(-size/2, size/2);
      ctx.lineTo(-size/3, -size/2);
      ctx.lineTo(size/3, -size/2);
      ctx.lineTo(size/2, size/2);
      ctx.closePath();
      ctx.fill();
      break;
    case 'parallelogram':
      ctx.beginPath();
      ctx.moveTo(-size/4, -size/2);
      ctx.lineTo(size/2, -size/2);
      ctx.lineTo(size/4, size/2);
      ctx.lineTo(-size/2, size/2);
      ctx.closePath();
      ctx.fill();
      break;
  }
  ctx.restore();
}

    drawAnimal(key, x + cardW/2, y + 70, 40, hover);
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(animal.name, x + cardW/2, y + 125);
    
    ctx.font = '14px sans-serif';
    ctx.fillText(animal.desc, x + cardW/2, y + 145);
  });
  
  // Page navigation arrows
  if (totalPages > 1) {
    const arrowY = 500;
    const arrowSize = 50;
    
    // Left arrow
    if (animalPage > 0) {
      const leftHover = isPointInRect(lastClickX, lastClickY, 30, arrowY, arrowSize, arrowSize);
      ctx.fillStyle = leftHover ? modeColor : (modeColor + 'AA');
      ctx.beginPath();
      ctx.moveTo(30 + arrowSize/2, arrowY);
      ctx.lineTo(30 + arrowSize, arrowY + arrowSize/2);
      ctx.lineTo(30 + arrowSize, arrowY - arrowSize/2);
      ctx.closePath();
      ctx.fill();
    }
    
    // Right arrow
    if (animalPage < totalPages - 1) {
      const rightHover = isPointInRect(lastClickX, lastClickY, GAME_WIDTH - 80, arrowY, arrowSize, arrowSize);
      ctx.fillStyle = rightHover ? modeColor : (modeColor + 'AA');
      ctx.beginPath();
      ctx.moveTo(GAME_WIDTH - 80 + arrowSize/2, arrowY);
      ctx.lineTo(GAME_WIDTH - 80, arrowY + arrowSize/2);
      ctx.lineTo(GAME_WIDTH - 80, arrowY - arrowSize/2);
      ctx.closePath();
      ctx.fill();
    }
    
    // Page indicator
    ctx.fillStyle = COLORS.textDark;
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${animalPage + 1} / ${totalPages}`, GAME_WIDTH/2, arrowY + 5);
  }
}

// ==================== INPUT HANDLING ====================
let lastClickX = 0, lastClickY = 0;

function getClickPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GAME_WIDTH / rect.width;
  const scaleY = GAME_HEIGHT / rect.height;
  
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  
  lastClickX = (clientX - rect.left) * scaleX;
  lastClickY = (clientY - rect.top) * scaleY;
}

canvas.addEventListener('click', (e) => {
  e.preventDefault();
  sound.init();
  sound.play('click');
  getClickPos(e);
  handleClick();
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  sound.init();
  sound.play('click');
  getClickPos(e);
  handleClick();
}, { passive: false });

function handleClick() {
  const now = Date.now();
  
  switch(currentScene) {
    case 'modeSelect':
      if (isPointInRect(lastClickX, lastClickY, GAME_WIDTH/2 - 150, 260, 300, 100)) {
        selectedMode = 'toddler';
        animalPage = 0;
        currentScene = 'home';
        sound.play('click');
      } else if (isPointInRect(lastClickX, lastClickY, GAME_WIDTH/2 - 150, 420, 300, 100)) {
        selectedMode = 'child';
        animalPage = 0;
        currentScene = 'home';
        sound.play('click');
      } else if (lastClickX > GAME_WIDTH - 150 && lastClickY > GAME_HEIGHT - 150) {
        if (now - lastClickTime < 500) {
          clickCount++;
        } else {
          clickCount = 1;
        }
        lastClickTime = now;
        if (clickCount >= 5) {
          clickCount = 0;
          if (Date.now() < parentPinLockUntil) {
            alert(`锁定中，请${Math.ceil((parentPinLockUntil - Date.now()) / 1000)}秒后重试`);
          } else {
            currentScene = 'pin';
            parentPinInput = '';
          }
        }
      }
      break;
      
    case 'home':
      // Back
      if (isPointInRect(lastClickX, lastClickY, 20, 60, 50, 40)) {
        currentScene = 'modeSelect';
        sound.play('click');
      }
      // Page navigation
      else {
        const allAnimals = Object.entries(ANIMALS).filter(([key, a]) => 
          selectedMode === 'toddler' ? (a.mode === 'toddler' || a.mode === 'both') : (a.mode === 'child' || a.mode === 'both')
        );
        const totalPages = Math.ceil(allAnimals.length / ANIMALS_PER_PAGE);
        const arrowY = 500;
        const arrowSize = 50;
        
        // Left arrow
        if (animalPage > 0 && isPointInRect(lastClickX, lastClickY, 30, arrowY, arrowSize, arrowSize)) {
          animalPage--;
          sound.play('page');
        }
        // Right arrow
        else if (animalPage < totalPages - 1 && isPointInRect(lastClickX, lastClickY, GAME_WIDTH - 80, arrowY, arrowSize, arrowSize)) {
          animalPage++;
          sound.play('page');
        }
        // Animal cards
        else {
          const cardW = 220;
          const cardH = 180;
          const gapX = 40;
          const gapY = 25;
          const cols = 3;
          const startX = (GAME_WIDTH - (cardW * cols + gapX * (cols - 1))) / 2;
          const startY = 130;
          
          const startIdx = animalPage * ANIMALS_PER_PAGE;
          const pageAnimals = allAnimals.slice(startIdx, startIdx + ANIMALS_PER_PAGE);
          
          pageAnimals.forEach(([key, animal], i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = startX + col * (cardW + gapX);
            const y = startY + row * (cardH + gapY);
            
            if (isPointInRect(lastClickX, lastClickY, x, y, cardW, cardH)) {
              selectedAnimal = key;
              currentLevel = saveData.animals[key].level;
              startGame();
            }
          });
        }
      }
      break;
      
    case 'game':
      if (!isAnswered) {
        const optY = 320;
        const optH = 90;
        const optW = 180;
        const optGap = 30;
        const totalW = answerOptions.length * optW + (answerOptions.length - 1) * optGap;
        const startX = (GAME_WIDTH - totalW) / 2;
        
        answerOptions.forEach((opt, i) => {
          const x = startX + i * (optW + optGap);
          if (isPointInRect(lastClickX, lastClickY, x, optY, optW, optH)) {
            selectedAnswer = opt;
            isAnswered = true;
            
            const q = questions[currentQuestion];
            const isCorrect = opt === q.answer || (q.type === 'chinese' && q.answer.includes(opt));
            
            if (isCorrect) {
              correctCount++;
              sessionCorrect++;
              sessionStars++;
              stars++;
              saveData.animals[selectedAnimal].stars++;
              saveData.stats[selectedAnimal].correct++;
              createParticles(lastClickX, lastClickY, 'correct');
              sound.play('correct');
              setTimeout(() => sound.play('star'), 200);
            } else {
              wrongCount++;
              saveData.stats[selectedAnimal].total++;
              createParticles(lastClickX, lastClickY, 'wrong');
              sound.play('wrong');
            }
            saveSaveData();
          }
        });
      } else {
        if (isPointInRect(lastClickX, lastClickY, GAME_WIDTH/2 - 80, 500, 160, 60)) {
          currentQuestion++;
          if (currentQuestion >= totalQuestions) {
            saveData.stats[selectedAnimal].total += totalQuestions;
            
            // Level up check
            if (correctCount >= totalQuestions * 0.8 && saveData.animals[selectedAnimal].level < 5) {
              saveData.animals[selectedAnimal].level++;
            }
            
            saveSaveData();
            currentScene = 'result';
          } else {
            selectedAnswer = null;
            isAnswered = false;
            // Update options for new question
            const q = questions[currentQuestion];
            answerOptions = shuffle(q.options);
          }
        }
      }
      break;
      
    case 'result':
      if (isPointInRect(lastClickX, lastClickY, 120, 500, 180, 70)) {
        startGame();
      } else if (isPointInRect(lastClickX, lastClickY, 500, 500, 180, 70)) {
        currentScene = 'home';
      }
      break;
      
    case 'parent':
      if (isPointInRect(lastClickX, lastClickY, 30, 35, 60, 40)) {
        currentScene = 'home';
      } else if (isPointInRect(lastClickX, lastClickY, 400, 390, 360, 70)) {
        selectedMode = selectedMode === 'toddler' ? 'child' : 'toddler';
        saveData.mode = selectedMode;
        saveSaveData();
      } else if (isPointInRect(lastClickX, lastClickY, 40, 480, 340, 50)) {
        inputMode = true;
        inputText = '';
        inputPrompt = '新PIN码（4位数字）';
      } else if (isPointInRect(lastClickX, lastClickY, 400, 480, 360, 50)) {
        if (confirm('确定要重置所有进度吗？此操作不可撤销！')) {
          resetAllProgress();
        }
      }
      break;
      
    case 'pin':
      handlePinInput();
      break;
  }
}

function handlePinInput() {
  const keys = ['1','2','3','4','5','6','7','8','9','0'];
  const keyW = 80;
  const keyH = 50;
  const keyGap = 15;
  const keyStartX = 250;
  const keyStartY = 320;
  
  keys.forEach((key, i) => {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const x = keyStartX + col * (keyW + keyGap);
    const y = keyStartY + row * (keyH + keyGap);
    
    if (isPointInRect(lastClickX, lastClickY, x, y, keyW, keyH)) {
      if (parentPinInput.length < 4) {
        parentPinInput += key;
        sound.play('click');
      }
    }
  });
  
  if (isPointInRect(lastClickX, lastClickY, keyStartX, keyStartY + 3 * (keyH + keyGap), keyW, keyH)) {
    parentPinInput = parentPinInput.slice(0, -1);
    sound.play('click');
  }
  
  if (isPointInRect(lastClickX, lastClickY, keyStartX + 2 * (keyW + keyGap), keyStartY + 3 * (keyH + keyGap), keyW, keyH)) {
    if (parentPinInput === parentPin) {
      currentScene = 'parent';
      parentPinInput = '';
      parentPinAttempts = 0;
      sound.play('correct');
    } else {
      parentPinAttempts++;
      sound.play('wrong');
      if (parentPinAttempts >= 5) {
        parentPinLockUntil = Date.now() + 15 * 60 * 1000;
        alert('连续5次错误，锁定15分钟');
        currentScene = 'modeSelect';
        parentPinInput = '';
        parentPinAttempts = 0;
      } else {
        alert(`PIN码错误，剩余${5 - parentPinAttempts}次机会`);
        parentPinInput = '';
      }
    }
  }
  
  if (isPointInRect(lastClickX, lastClickY, 250, 545, 300, 45)) {
    currentScene = 'modeSelect';
    parentPinInput = '';
  }
}

function startGame() {
  currentScene = 'game';
  currentQuestion = 0;
  correctCount = 0;
  wrongCount = 0;
  sessionStars = 0;
  sessionCorrect = 0;
  sessionTotal = 0;
  isAnswered = false;
  selectedAnswer = null;
  particles = [];
  
  questions = generateQuestions(selectedAnimal, currentLevel);
  answerOptions = [];
  
  const q = questions[0];
  answerOptions = shuffle(q.options);
  
  saveData.daily[todayStr].sessions++;
  saveSaveData();
}

function resetAllProgress() {
  saveData = {
    version: 2,
    pin: '0000',
    mode: 'toddler',
    stars: 0,
    animals: {
      fox:    { level: 1, stars: 0, completed: [] },
      bear:   { level: 1, stars: 0, completed: [] },
      bird:   { level: 1, stars: 0, completed: [] },
      cat:    { level: 1, stars: 0, completed: [] },
      monkey: { level: 1, stars: 0, completed: [] },
      owl:    { level: 1, stars: 0, completed: [] },
      rabbit: { level: 1, stars: 0, completed: [] },
      squirrel:{ level: 1, stars: 0, completed: [] },
      deer:   { level: 1, stars: 0, completed: [] },
      beaver: { level: 1, stars: 0, completed: [] }
    },
    stats: {
      fox:    { total: 0, correct: 0 },
      bear:   { total: 0, correct: 0 },
      bird:   { total: 0, correct: 0 },
      cat:    { total: 0, correct: 0 },
      monkey: { total: 0, correct: 0 },
      owl:    { total: 0, correct: 0 },
      rabbit: { total: 0, correct: 0 },
      squirrel:{ total: 0, correct: 0 },
      deer:   { total: 0, correct: 0 },
      beaver: { total: 0, correct: 0 }
    },
    daily: {}
  };
  stars = 0;
  parentPin = '0000';
  saveSaveData();
  alert('已重置所有进度');
}

// ==================== GAME LOOP ====================
function gameLoop() {
  animFrame++;
  
  const now = Date.now();
  if (currentScene === 'game' || currentScene === 'home') {
    saveData.daily[todayStr].time = Math.floor((now - gameStartTime) / 1000);
    if (animFrame % 60 === 0) saveSaveData();
  }
  
  updateParticles();
  
  switch(currentScene) {
    case 'splash': drawSplashScene(); break;
    case 'modeSelect': drawModeSelectScene(); break;
    case 'home': drawHomeScene(); break;
    case 'game': drawGameScene(); break;
    case 'result': drawResultScene(); break;
    case 'parent': drawParentScene(); break;
    case 'pin': drawPinScene(); break;
  }
  
  requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
loadSaveData();
selectedMode = saveData.mode || 'toddler';
gameLoop();
</script>
